<!DOCTYPE html>
<html>
<head><title>Proxy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body{margin:0;font-family:system-ui;background:#111;color:#fff}
  #bar{display:flex;padding:8px;background:#1a1a1a}
  #url{flex:1;padding:8px;background:#222;color:#fff;border:1px solid #333;border-radius:4px;font-size:16px}
  #btn{padding:8px 12px;margin-left:4px;background:#333;color:#fff;border:none;border-radius:4px}
  iframe{width:100%;height:calc(100vh - 50px);border:none;background:#fff}
</style>
</head>
<body>
<div id="bar">
  <input id="url" type="text" placeholder="https://example.com" value="https://en.wikipedia.org">
  <button id="btn" onclick="load()">Go</button>
</div>
<iframe id="frame"></iframe>

<script>
function load() {
  const url = document.getElementById('url').value;
  // Try multiple free public web proxies that work via iframe
  const proxyServices = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    `https://cors-anywhere.herokuapp.com/${url}`,
    `https://cors.bridged.cc/${url}`,
    `https://thingproxy.freeboard.io/fetch/${url}`,
  ];
  
  // Try direct iframe first (some sites allow it)
  document.getElementById('frame').src = url;
  
  // Fallback: fetch via proxy and display
  setTimeout(async () => {
    for (let proxy of proxyServices) {
      try {
        const r = await fetch(proxy);
        const html = await r.text();
        const blob = new Blob([rewriteLinks(html, url)], {type: 'text/html'});
        document.getElementById('frame').src = URL.createObjectURL(blob);
        return;
      } catch(e) {}
    }
    // Last resort: try through Google Translate proxy
    document.getElementById('frame').src = 
      `https://translate.google.com/translate?hl=en&u=${encodeURIComponent(url)}`;
  }, 2000);
}

function rewriteLinks(html, baseURL) {
  // Fix relative URLs
  const base = new URL(baseURL);
  return html.replace(/(href|src|action)=["'](?!https?:\/\/|\/\/|#|javascript:|data:|mailto:)([^"']+)["']/gi,
    (m, attr, path) => {
      try { return `${attr}="${new URL(path, base).href}"`; }
      catch { return m; }
    }
  );
}

document.getElementById('url').addEventListener('keypress', e => {
  if (e.key === 'Enter') load();
});
</script>
</body>
</html>
